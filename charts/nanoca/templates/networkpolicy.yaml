{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nanoca.fullname" . }}
  labels:
    {{- include "nanoca.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nanoca.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Same-pod traffic: cloudflared sidecar -> nanoca-server on localhost.
    # K8s NetworkPolicy doesn't gate intra-pod traffic, but listing this
    # explicitly documents the intended flow.
    {{- with .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8443
    {{- end }}
  egress:
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- end }}
