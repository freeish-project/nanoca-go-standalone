apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nanoca.configMapName" . }}
  labels:
    {{- include "nanoca.labels" . | nindent 4 }}
data:
  NANOCA_BASE_URL: {{ required "nanoca.baseUrl is required" .Values.nanoca.baseUrl | quote }}
  NANOCA_PREFIX: {{ .Values.nanoca.prefix | quote }}
  NANOCA_LISTEN: {{ .Values.nanoca.listen | quote }}
  NANOCA_DATA_DIR: {{ .Values.nanoca.dataDir | quote }}
  NANOCA_ENABLE_TPM: {{ .Values.nanoca.enableTPM | quote }}
  NANOCA_FLEET_URL: {{ .Values.nanoca.fleetUrl | quote }}
  {{- if .Values.nanoca.chainFile.enabled }}
  NANOCA_CHAIN_FILE: {{ .Values.nanoca.chainFile.mountPath | quote }}
  {{- end }}
  {{- if .Values.nanoca.remoteSigner.enabled }}
  NANOCA_REMOTE_SIGNER_URL: {{ required "nanoca.remoteSigner.url is required when remoteSigner.enabled" .Values.nanoca.remoteSigner.url | quote }}
  NANOCA_REMOTE_SIGNER_PUBKEY: {{ .Values.nanoca.remoteSigner.pubKeyMountPath | quote }}
  {{- end }}
