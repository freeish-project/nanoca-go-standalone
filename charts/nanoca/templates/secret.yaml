{{- /*
Chart-managed Secret. Only rendered when secrets.create=true (dev-only).
Production deployments should pre-create a Secret out-of-band and reference
it via secrets.existingSecret.
*/ -}}
{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nanoca.fullname" . }}
  labels:
    {{- include "nanoca.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.pem: {{ required "secrets.caCert is required when secrets.create=true" .Values.secrets.caCert | quote }}
  {{- if not .Values.nanoca.remoteSigner.enabled }}
  ca.key: {{ required "secrets.caKey is required when secrets.create=true and remoteSigner is disabled" .Values.secrets.caKey | quote }}
  {{- end }}
  {{- if .Values.nanoca.fleetUrl }}
  NANOCA_FLEET_TOKEN: {{ required "secrets.fleetToken is required when nanoca.fleetUrl is set" .Values.secrets.fleetToken | quote }}
  {{- end }}
  {{- if .Values.nanoca.chainFile.enabled }}
  chain.pem: {{ required "secrets.chain is required when nanoca.chainFile.enabled" .Values.secrets.chain | quote }}
  {{- end }}
  {{- if .Values.nanoca.remoteSigner.enabled }}
  signer-pub.pem: {{ required "secrets.signerPubKey is required when nanoca.remoteSigner.enabled" .Values.secrets.signerPubKey | quote }}
  NANOCA_REMOTE_SIGNER_TOKEN: {{ required "secrets.signerToken is required when nanoca.remoteSigner.enabled" .Values.secrets.signerToken | quote }}
  {{- end }}
  {{- if and .Values.cloudflared.enabled (not .Values.cloudflared.existingTokenSecret) }}
  CLOUDFLARE_TUNNEL_TOKEN: {{ required "secrets.cloudflareTunnelToken is required when cloudflared.enabled and no existingTokenSecret is provided" .Values.secrets.cloudflareTunnelToken | quote }}
  {{- end }}
{{- end }}
