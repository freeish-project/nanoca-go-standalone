apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanoca-server
  namespace: security-infra
  labels:
    app: nanoca-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nanoca-server
  template:
    metadata:
      labels:
        app: nanoca-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      # Best-effort spread across zones for real multi-AZ availability with
      # the default replicas: 2. ScheduleAnyway rather than DoNotSchedule so
      # single-zone clusters still place pods.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: nanoca-server

      containers:
        # nanoca ACME CA server
        - name: nanoca-server
          # CI publishes this image on every push to main of nanoca-go-standalone.
          # Override with your own fork's GHCR path if you maintain a fork.
          image: ghcr.io/freeish-project/nanoca-server:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
          env:
            - name: NANOCA_LISTEN
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_LISTEN
            - name: NANOCA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_BASE_URL
            - name: NANOCA_DATA_DIR
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_DATA_DIR
            - name: NANOCA_ENABLE_TPM
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_ENABLE_TPM
            - name: NANOCA_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_PREFIX
            - name: NANOCA_FLEET_URL
              valueFrom:
                configMapKeyRef:
                  name: nanoca-config
                  key: NANOCA_FLEET_URL
            - name: NANOCA_FLEET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nanoca-secrets
                  key: NANOCA_FLEET_TOKEN
            # CA cert/key loaded from file paths (volume-mounted Secret)
            # Defaults match the mount path: /etc/nanoca/ca.pem, /etc/nanoca/ca.key
            # Optional: remote signer token (uncomment if using remote signing oracle)
            # - name: NANOCA_REMOTE_SIGNER_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: nanoca-secrets
            #       key: NANOCA_REMOTE_SIGNER_TOKEN
          volumeMounts:
            - name: ca-certs
              mountPath: /etc/nanoca
              readOnly: true
            - name: tpm-cache
              mountPath: /var/lib/nanoca/tpm-roots
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: 8443
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

        # Cloudflare Tunnel sidecar
        # Routes traffic from Cloudflare network to localhost:8443 in the pod.
        # Configure the tunnel hostname -> localhost:8443 in Cloudflare dashboard.
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args: ["tunnel", "--no-autoupdate", "run"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nanoca-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        # CA cert/key from Secret, projected as files.
        # Only ca.pem and ca.key are mounted (not the token keys).
        - name: ca-certs
          secret:
            secretName: nanoca-secrets
            items:
              - key: ca.pem
                path: ca.pem
              - key: ca.key
                path: ca.key
                mode: 0400
              # Uncomment to mount chain file for full certificate chain serving
              # - key: chain.pem
              #   path: chain.pem
              # Uncomment to mount remote signer public key
              # - key: signer-pub.pem
              #   path: signer-pub.pem
        # Pod-local cache for TPM vendor root CAs.
        # Survives container restarts but wiped on pod reschedule.
        # FetchRoots re-populates on startup; daily refresh keeps it current.
        - name: tpm-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
