apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nanoca-hpa
  namespace: security-infra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nanoca-server
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
