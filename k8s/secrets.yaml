apiVersion: v1
kind: Secret
metadata:
  name: nanoca-secrets
  namespace: security-infra
type: Opaque
# ALL VALUES BELOW ARE PLACEHOLDERS. Do not apply this file directly.
# Populate with real values before deploying, or use: kubectl create secret generic ...
data:
  # CA certificate and private key -- mounted as files at /etc/nanoca/
  # Generate with: cat ca.pem | base64 -w0
  ca.pem: "YOUR_BASE64_ENCODED_CA_CERT_PEM"
  # Generate with: cat ca.key | base64 -w0
  ca.key: "YOUR_BASE64_ENCODED_CA_KEY_PEM"
  # Fleet API token (host read permissions required)
  # Generate with: echo -n 'your-fleet-token' | base64
  NANOCA_FLEET_TOKEN: "YOUR_BASE64_ENCODED_FLEET_TOKEN"
  # Cloudflare Tunnel token
  # Generate with: echo -n 'your-tunnel-token' | base64
  CLOUDFLARE_TUNNEL_TOKEN: "YOUR_BASE64_ENCODED_TUNNEL_TOKEN"
  # Optional: certificate chain file (intermediate + root PEM bundle)
  # Generate with: cat intermediate.pem root.pem | base64 -w0
  # chain.pem: "YOUR_BASE64_ENCODED_CHAIN_PEM"
  # Optional: remote signer public key (ECDSA, PKIX PEM)
  # Generate with: cat signer-pub.pem | base64 -w0
  # signer-pub.pem: "YOUR_BASE64_ENCODED_SIGNER_PUBKEY_PEM"
  # Optional: remote signer bearer token
  # Generate with: echo -n 'your-signer-token' | base64
  # NANOCA_REMOTE_SIGNER_TOKEN: "YOUR_BASE64_ENCODED_SIGNER_TOKEN"
